<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>秒懂词 - 初中英语反应训练</title>
  <style>
:root {
  color-scheme: light;
  --ink: #18212f;
  --muted: #667085;
  --line: #d9e0ea;
  --paper: #f7f5f0;
  --panel: #ffffff;
  --green: #1f9d62;
  --red: #d04444;
  --blue: #2563eb;
  --yellow: #f2b84b;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
}

button,
select {
  font: inherit;
}

button {
  border: 1px solid var(--ink);
  background: var(--ink);
  color: white;
  border-radius: 8px;
  padding: 10px 16px;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

select {
  min-width: 112px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 10px;
  background: white;
  color: var(--ink);
}

.app-shell {
  width: min(1120px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 40px;
}

.topbar {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 20px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}

h1,
h2,
p {
  margin: 0;
}

h1 {
  font-size: 34px;
  line-height: 1.1;
}

.topbar p,
.feedback-row,
.wrongbook {
  color: var(--muted);
}

.controls {
  display: flex;
  align-items: end;
  gap: 12px;
  flex-wrap: wrap;
}

.controls label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 13px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin: 18px 0;
}

.stats div {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
}

.stats strong {
  display: block;
  font-size: 24px;
  line-height: 1.1;
}

.stats span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 13px;
}

.trainer,
.wrongbook {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
}

.progress {
  display: grid;
  gap: 8px;
  color: var(--muted);
  font-size: 14px;
}

.progress-track {
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #eef2f7;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: var(--green);
  transition: width 180ms ease;
}

.word-card {
  margin: 18px 0;
  min-height: 210px;
  display: grid;
  align-content: center;
  gap: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 28px;
  background: #fbfcff;
  text-align: center;
}

#tag {
  justify-self: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 10px;
  color: var(--muted);
  font-size: 13px;
}

#word {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(46px, 8vw, 86px);
  line-height: 1;
  letter-spacing: 0;
}

#hint {
  color: var(--muted);
}

.choices {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.typing-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
}

.typing-panel[hidden] {
  display: none;
}

.typing-panel input {
  min-height: 54px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--ink);
  font: 24px Georgia, "Times New Roman", serif;
}

.choice {
  min-height: 66px;
  border-color: var(--line);
  background: white;
  color: var(--ink);
  text-align: left;
}

.choice.correct {
  border-color: var(--green);
  background: #e8f7ef;
}

.choice.wrong {
  border-color: var(--red);
  background: #fff0f0;
}

.feedback-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  min-height: 54px;
  margin-top: 12px;
}

#skipBtn,
#resetBtn {
  background: white;
  color: var(--ink);
  border-color: var(--line);
}

.wrongbook {
  margin-top: 18px;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.section-head h2 {
  color: var(--ink);
  font-size: 20px;
}

.word-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}

.word-chip {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 10px;
  background: #fbfcff;
  color: var(--ink);
}

.word-chip span:last-child {
  color: var(--muted);
}

@media (max-width: 760px) {
  .app-shell {
    width: min(100% - 20px, 1120px);
    padding-top: 18px;
  }

  .topbar {
    align-items: stretch;
    flex-direction: column;
  }

  .controls,
  .feedback-row,
  .section-head {
    align-items: stretch;
    flex-direction: column;
  }

  .controls label,
  .controls button,
  .feedback-row button,
  .section-head button {
    width: 100%;
  }

  .stats {
    grid-template-columns: repeat(2, 1fr);
  }

  .choices {
    grid-template-columns: 1fr;
  }

  .typing-panel {
    grid-template-columns: 1fr;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <section class="topbar" aria-label="训练控制">
      <div>
        <h1>秒懂词</h1>
        <p>看到英文，立刻反应中文。</p>
      </div>
      <div class="controls">
        <label>
          训练量
          <select id="sessionSize">
            <option value="20">20 词</option>
            <option value="50" selected>50 词</option>
            <option value="100">100 词</option>
          </select>
        </label>
        <label>
          范围
          <select id="deckMode">
            <option value="all" selected>全部词库</option>
            <option value="wrong">只练错词</option>
            <option value="new">优先新词</option>
          </select>
        </label>
        <label>
          模式
          <select id="practiceMode">
            <option value="enToZh" selected>看英文选中文</option>
            <option value="zhToEn">看中文说英文</option>
          </select>
        </label>
        <button id="startBtn" type="button">开始</button>
      </div>
    </section>

    <section class="stats" aria-label="今日统计">
      <div>
        <strong id="totalWords">0</strong>
        <span>内置词汇</span>
      </div>
      <div>
        <strong id="doneCount">0</strong>
        <span>已练</span>
      </div>
      <div>
        <strong id="accuracy">0%</strong>
        <span>正确率</span>
      </div>
      <div>
        <strong id="fastRate">0%</strong>
        <span>快速率</span>
      </div>
      <div>
        <strong id="wrongCount">0</strong>
        <span>错词</span>
      </div>
    </section>

    <section class="trainer" aria-live="polite">
      <div class="progress">
        <span id="progressText">还未开始</span>
        <div class="progress-track">
          <div id="progressBar"></div>
        </div>
      </div>
      <article class="word-card">
        <span id="tag">初中核心词</span>
        <h2 id="word">Ready?</h2>
        <p id="hint">选择训练量后点击开始。每个词越快选出中文越好。</p>
      </article>
      <div id="choices" class="choices"></div>
      <form id="typingPanel" class="typing-panel" hidden>
        <input id="typingAnswer" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="输入英文单词">
        <button type="submit">确认</button>
      </form>
      <div class="feedback-row">
        <p id="feedback">本地保存练习记录，刷新页面也不会丢。</p>
        <button id="skipBtn" type="button" disabled>不会</button>
      </div>
    </section>

    <section class="wrongbook">
      <div class="section-head">
        <h2>错词本</h2>
        <button id="resetBtn" type="button">清空记录</button>
      </div>
      <div id="wrongList" class="word-list"></div>
    </section>
  </main>

const FALLBACK_WORDS = RAW_WORDS.trim().split("\n").slice(0, 500).map((line, index) => {
  const [en, zh] = line.split("|");
  return { id: index + 1, en, zh };
});

const WORDS = (window.WORD_SNAP_WORDS && window.WORD_SNAP_WORDS.length)
  ? window.WORD_SNAP_WORDS.map((word, index) => ({
      id: word.id || index + 1,
      en: word.en,
      zh: word.zh,
      pos: word.pos || "",
      notes: word.notes || "",
      frequency: word.frequency || 0
    }))
  : FALLBACK_WORDS;

const storeKey = "word-snap-mvp-v1";
const state = {
  queue: [],
  current: null,
  startedAt: 0,
  done: 0,
  correct: 0,
  fast: 0,
  answered: false,
  records: loadRecords()
};

const els = {
  sessionSize: document.querySelector("#sessionSize"),
  deckMode: document.querySelector("#deckMode"),
  practiceMode: document.querySelector("#practiceMode"),
  startBtn: document.querySelector("#startBtn"),
  skipBtn: document.querySelector("#skipBtn"),
  resetBtn: document.querySelector("#resetBtn"),
  totalWords: document.querySelector("#totalWords"),
  doneCount: document.querySelector("#doneCount"),
  accuracy: document.querySelector("#accuracy"),
  fastRate: document.querySelector("#fastRate"),
  wrongCount: document.querySelector("#wrongCount"),
  progressText: document.querySelector("#progressText"),
  progressBar: document.querySelector("#progressBar"),
  tag: document.querySelector("#tag"),
  word: document.querySelector("#word"),
  hint: document.querySelector("#hint"),
  choices: document.querySelector("#choices"),
  typingPanel: document.querySelector("#typingPanel"),
  typingAnswer: document.querySelector("#typingAnswer"),
  feedback: document.querySelector("#feedback"),
  wrongList: document.querySelector("#wrongList")
};

function loadRecords() {
  try {
    return JSON.parse(localStorage.getItem(storeKey)) || {};
  } catch {
    return {};
  }
}

function saveRecords() {
  localStorage.setItem(storeKey, JSON.stringify(state.records));
}

function shuffle(items) {
  const copy = [...items];
  for (let i = copy.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function getWrongWords() {
  return WORDS.filter((word) => (state.records[word.en]?.wrong || 0) > 0);
}

function scoreForNewWords(word) {
  const record = state.records[word.en];
  if (!record) return -100;
  return (record.seen || 0) + (record.correct || 0) * 2 + (record.wrong || 0) * 5;
}

function buildQueue() {
  const size = Number(els.sessionSize.value);
  const mode = els.deckMode.value;
  if (mode === "wrong") {
    const wrong = getWrongWords();
    return shuffle(wrong.length ? wrong : WORDS).slice(0, size);
  }
  if (mode === "new") {
    return shuffle([...WORDS].sort((a, b) => scoreForNewWords(a) - scoreForNewWords(b)).slice(0, size * 2)).slice(0, size);
  }
  const weightedWrong = getWrongWords().flatMap((word) => [word, word]);
  return shuffle([...WORDS, ...weightedWrong]).slice(0, size);
}

function startSession() {
  state.queue = buildQueue();
  state.done = 0;
  state.correct = 0;
  state.fast = 0;
  state.current = null;
  els.skipBtn.disabled = false;
  els.feedback.textContent = "开始后不要默念太久，第一反应最重要。";
  nextWord();
}

function nextWord() {
  state.answered = false;
  state.current = state.queue.shift();
  if (!state.current) {
    finishSession();
    return;
  }

  const choices = makeChoices(state.current);
  const mode = els.practiceMode.value;
  els.word.textContent = mode === "zhToEn" ? state.current.zh : state.current.en;
  els.tag.textContent = `第 ${state.done + 1} 词`;
  els.hint.textContent = mode === "zhToEn"
    ? "说出或输入对应英文。大小写不影响判断。"
    : "选出它最常见的中文意思。";
  els.feedback.textContent = mode === "zhToEn"
    ? "计时中：3 秒内答对记为快速反应。"
    : "计时中：1 秒内答对记为秒反。";
  els.choices.innerHTML = "";
  els.typingPanel.hidden = mode !== "zhToEn";
  els.choices.hidden = mode === "zhToEn";
  els.typingAnswer.value = "";
  els.typingAnswer.disabled = false;
  if (mode === "zhToEn") {
    window.setTimeout(() => els.typingAnswer.focus(), 0);
  } else {
    choices.forEach((choice) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "choice";
      button.textContent = choice.zh;
      button.addEventListener("click", () => answer(choice, button));
      els.choices.append(button);
    });
  }
  state.startedAt = performance.now();
  updateProgress();
}

function makeChoices(answer) {
  const wrongChoices = shuffle(WORDS.filter((word) => word.en !== answer.en)).slice(0, 3);
  return shuffle([answer, ...wrongChoices]);
}

function answer(choice, button) {
  if (state.answered || !state.current) return;
  state.answered = true;
  const elapsed = performance.now() - state.startedAt;
  const mode = els.practiceMode.value;
  const isCorrect = mode === "zhToEn"
    ? normalizeEnglish(choice.en) === normalizeEnglish(state.current.en)
    : choice.en === state.current.en;
  state.done += 1;
  state.correct += isCorrect ? 1 : 0;
  const fastLimit = mode === "zhToEn" ? 3000 : 1000;
  state.fast += isCorrect && elapsed <= fastLimit ? 1 : 0;

  recordAnswer(state.current, isCorrect, elapsed);
  if (mode === "zhToEn") {
    els.typingAnswer.disabled = true;
  } else {
    paintChoices(choice, button);
  }
  els.feedback.textContent = getFeedback(isCorrect, elapsed);
  updateStats();
  updateProgress();

  setTimeout(nextWord, isCorrect ? 700 : 1200);
}

function normalizeEnglish(value) {
  return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
}

function paintChoices(choice, clickedButton) {
  [...els.choices.children].forEach((button) => {
    if (button.textContent === state.current.zh) button.classList.add("correct");
    button.disabled = true;
  });
  if (choice.en !== state.current.en) clickedButton.classList.add("wrong");
}

function getFeedback(isCorrect, elapsed) {
  const extra = state.current.pos ? ` (${state.current.pos})` : "";
  if (!isCorrect) return `错词：${state.current.zh} = ${state.current.en}${extra}`;
  if (elapsed <= 1000) return `秒反成功：${(elapsed / 1000).toFixed(2)} 秒`;
  if (elapsed <= 3000) return `答对了，但还可以更快：${(elapsed / 1000).toFixed(2)} 秒`;
  return `答对了，用时 ${(elapsed / 1000).toFixed(2)} 秒，建议再刷一遍。`;
}

function recordAnswer(word, isCorrect, elapsed) {
  const record = state.records[word.en] || {
    zh: word.zh,
    seen: 0,
    correct: 0,
    wrong: 0,
    fast: 0,
    totalMs: 0
  };
  record.seen += 1;
  record.correct += isCorrect ? 1 : 0;
  record.wrong += isCorrect ? 0 : 1;
  record.fast += isCorrect && elapsed <= 1000 ? 1 : 0;
  record.totalMs += Math.round(elapsed);
  state.records[word.en] = record;
  saveRecords();
  renderWrongBook();
}

function skipWord() {
  if (state.answered || !state.current) return;
  if (els.practiceMode.value === "zhToEn") {
    answer({ en: "" }, null);
    return;
  }
  const fakeButton = [...els.choices.children].find((button) => button.textContent !== state.current.zh);
  answer({ en: "__skip__", zh: "" }, fakeButton || els.skipBtn);
}

function finishSession() {
  state.current = null;
  els.word.textContent = "Done";
  els.tag.textContent = "本轮完成";
  els.hint.textContent = "可以继续练错词，或把错词截图发给家长/老师看。";
  els.choices.innerHTML = "";
  els.choices.hidden = false;
  els.typingPanel.hidden = true;
  els.typingAnswer.disabled = false;
  els.skipBtn.disabled = true;
  els.feedback.textContent = `本轮完成：${state.done} 词，正确率 ${percent(state.correct, state.done)}，秒反率 ${percent(state.fast, state.done)}。`;
  updateProgress(true);
}

function percent(value, total) {
  return total ? `${Math.round((value / total) * 100)}%` : "0%";
}

function updateProgress(done = false) {
  const total = state.done + state.queue.length + (state.current && !state.answered ? 1 : 0);
  const progress = total ? Math.min(100, Math.round((state.done / total) * 100)) : 0;
  els.progressText.textContent = done ? "本轮已完成" : `进度 ${state.done}/${total}`;
  els.progressBar.style.width = `${done ? 100 : progress}%`;
}

function updateStats() {
  const wrongTotal = getWrongWords().length;
  els.totalWords.textContent = WORDS.length;
  els.doneCount.textContent = Object.values(state.records).reduce((sum, record) => sum + record.seen, 0);
  const totalCorrect = Object.values(state.records).reduce((sum, record) => sum + record.correct, 0);
  const totalSeen = Object.values(state.records).reduce((sum, record) => sum + record.seen, 0);
  const totalFast = Object.values(state.records).reduce((sum, record) => sum + record.fast, 0);
  els.accuracy.textContent = percent(totalCorrect, totalSeen);
  els.fastRate.textContent = percent(totalFast, totalSeen);
  els.wrongCount.textContent = wrongTotal;
}

function renderWrongBook() {
  const wrongWords = getWrongWords()
    .sort((a, b) => (state.records[b.en].wrong || 0) - (state.records[a.en].wrong || 0))
    .slice(0, 60);
  if (!wrongWords.length) {
    els.wrongList.innerHTML = "<p>还没有错词。开始一轮训练后这里会自动出现。</p>";
    return;
  }
  els.wrongList.innerHTML = "";
  wrongWords.forEach((word) => {
    const record = state.records[word.en];
    const item = document.createElement("div");
    item.className = "word-chip";
    item.innerHTML = `<span>${word.en}<br>${word.zh}</span><span>错 ${record.wrong}</span>`;
    if (word.notes) item.title = word.notes;
    els.wrongList.append(item);
  });
}

function resetRecords() {
  if (!confirm("确定清空所有本地练习记录吗？")) return;
  state.records = {};
  saveRecords();
  updateStats();
  renderWrongBook();
  els.feedback.textContent = "记录已清空。";
}

els.startBtn.addEventListener("click", startSession);
els.skipBtn.addEventListener("click", skipWord);
els.resetBtn.addEventListener("click", resetRecords);
els.typingPanel.addEventListener("submit", (event) => {
  event.preventDefault();
  if (!state.current || state.answered) return;
  answer({ en: els.typingAnswer.value }, null);
  window.setTimeout(() => {
    els.typingAnswer.disabled = false;
  }, 500);
});

updateStats();
renderWrongBook();

</script>
</body>
